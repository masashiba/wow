<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <div class="footer">
      <p id="status-msg"></p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
